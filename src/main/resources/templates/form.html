<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Form Input Mahasiswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h4 class="mb-0 text-center fw-bold">Form Input Mahasiswa</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/form}" method="post" th:object="${user}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nama Lengkap</label>
                            <input type="text" th:field="*{nama}" class="form-control" placeholder="Contoh: Budi Santoso" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nomor Induk Mahasiswa (NIM)</label>
                            <input type="text" th:field="*{nim}" class="form-control" placeholder="Masukkan NIM" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold d-block">Jenis Kelamin</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" th:field="*{jenisKelamin}" value="Laki-laki" id="lk" required>
                                <label class="form-check-label" for="lk">Laki-laki</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" th:field="*{jenisKelamin}" value="Perempuan" id="pr" required>
                                <label class="form-check-label" for="pr">Perempuan</label>
                            </div>
                        </div>

                        <hr class="mb-4">

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="/home" class="btn btn-light border px-4">Batal</a>
                            <button type="submit" class="btn btn-primary px-4 fw-bold">Simpan Data</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
