<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home - Data Mahasiswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="text-primary fw-bold">MY Website 20230140220</h1>
            <p class="text-secondary fs-5">Selamat datang, Muhammad Islam!</p>
        </div>
        <a href="/" class="btn btn-outline-danger px-4">Logout</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
            <h4 class="mb-0 fw-bold">Data Mahasiswa</h4>
            <a href="/form" class="btn btn-success">+ Input Data Baru</a>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover table-striped text-center mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="py-3">No</th>
                    <th class="py-3">Nama Lengkap</th>
                    <th class="py-3">NIM</th>
                    <th class="py-3">Jenis Kelamin</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="4" class="text-muted fst-italic py-4">Belum ada data mahasiswa yang diinput.</td>
                </tr>
                <tr th:each="user, stat : ${users}">
                    <td th:text="${stat.count}" class="py-3 align-middle"></td>
                    <td th:text="${user.nama}" class="py-3 align-middle"></td>
                    <td th:text="${user.nim}" class="py-3 align-middle"></td>
                    <td th:text="${user.jenisKelamin}" class="py-3 align-middle"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
